# ==========================================
# Super Copy Tools — 配置文件
# 请修改下方 <<< ... >>> 包裹的值，然后启动程序
# ==========================================

# --- DeepSeek 大模型 ---
# 获取 Key: https://platform.deepseek.com/api_keys
deepseek.api.key=<<<你的API Key>>>
deepseek.api.base-url=https://api.deepseek.com/v1
deepseek.model.name=deepseek-chat
# 可选: deepseek-chat (V3通用) | deepseek-reasoner (R1推理)

# --- Tesseract OCR 引擎 ---
tesseract.path=D:\\Program Files\\Tesseract-OCR\\tesseract.exe
tesseract.language=chi_sim+eng
# 可选: chi_sim | chi_sim+eng | eng | chi_tra+eng | jpn+eng

# --- Agent 参数 ---
agent.temperature=0.2
agent.max-tokens=4096
# temperature: 0~0.3 精确稳定 | 0.5~0.7 灵活创造 | 0.8~1.0 随机

# --- 打字延迟(秒) ---
typing.delay.seconds=8
